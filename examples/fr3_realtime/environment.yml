# Lightweight runtime environment for the x86_64 RT-kernel FR3 control PC.
#
# Usage on the robot/RT machine:
#   conda env create -f environment.yml
#   conda activate fr3-realtime
#
# This intentionally does not install the full OpenPI/JAX/Torch training stack.
# It is meant for:
#   python robot_server.py --robot-ip 172.16.0.2
#   python go_home.py --robot-ip 172.16.0.2
#
# ARM/aarch64 machines should use ../fr3_realtime_arm/environment.yml instead.
name: fr3-realtime
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel
  - libgcc-ng
  - libstdcxx-ng
  - pip:
      - "numpy>=1.22.4,<2.0.0"
      - "franky-control==1.1.3"
      - "msgpack>=1.0.5"
      - "pyzmq>=26.0.0"
      - "grpcio>=1.60.0"
      - "protobuf>=4.25.0,<6"
