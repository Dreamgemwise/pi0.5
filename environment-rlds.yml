name: openpi-rlds
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - git
  - ffmpeg
  - cmake
  - ninja
  - pkg-config
  - compilers
  - libstdcxx-ng
  - evdev
  - pip:
      - datasets>=2.19.0,<4
      - gcsfs==2025.3.0
      - ml-dtypes==0.4.1
      - tensorstore==0.1.74
      - pytest>=8.3.4
      - ruff>=0.8.6
      - pre-commit>=4.0.1
      - ipykernel>=6.29.5
      - ipywidgets>=8.1.5
      - matplotlib>=3.10.0
      - msgpack>=1.0.5
      - opencv-python>=4.10.0.84
      - pyarrow
      - pyzmq
      - pynvml>=12.0.0
      - torchcodec>=0.5,<0.6
      - dlimp @ git+https://github.com/kvablack/dlimp.git@ad72ce3a9b414db2185bc0b38461d4101a65477a
      - tensorflow-cpu==2.15.0
      - tensorflow-datasets==4.9.9
      - -e ./packages/openpi-client
      - -e .
